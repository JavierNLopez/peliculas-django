{% extends "movies/base.html" %}

{% block title %}Iniciar sesión | MyMovies{% endblock %}

{% block content %}
  <section class="auth-card">
    <h1>Iniciar sesión</h1>
    <p class="muted">Accede para escribir reseñas y administrar tu cuenta.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="actions">
        <button type="submit" class="btn btn-primary">Entrar</button>
        <a href="{% url 'register' %}" class="btn btn-secondary">Crear cuenta</a>
      </div>
    </form>
  </section>
{% endblock %}
