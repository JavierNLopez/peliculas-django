{% extends "movies/base.html" %}

{% block title %}Registro | MyMovies{% endblock %}

{% block content %}
  <section class="auth-card">
    <h1>Crear cuenta</h1>
    <p class="muted">Regístrate para guardar reseñas y usar tu propio perfil.</p>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}

      <div class="actions">
        <button type="submit" class="btn btn-primary">Registrarme</button>
        <a href="{% url 'login' %}" class="btn btn-secondary">Ya tengo cuenta</a>
      </div>
    </form>
  </section>
{% endblock %}
