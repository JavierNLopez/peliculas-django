<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MyMovies{% endblock %}</title>
  <style>
    :root{
      --bg:#071226;
      --panel:#16233d;
      --panel-soft:#1e2e4d;
      --line:rgba(255,255,255,.08);
      --text:#f8fafc;
      --muted:#b6c2d2;
      --primary:#f43f5e;
      --primary-hover:#e11d48;
      --secondary:#334155;
      --gold:#fbbf24;
      --gold-bg:rgba(251,191,36,.16);
      --shadow:0 14px 35px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      font-family:Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(244,63,94,.10), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,.10), transparent 25%),
        linear-gradient(180deg, #030712 0%, #071226 55%, #08152c 100%);
      color:var(--text);
      min-height:100vh;
    }

    a{color:inherit;text-decoration:none}

    .navbar{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter:blur(12px);
      background:rgba(3,7,18,.82);
      border-bottom:1px solid var(--line);
    }

    .nav-inner{
      width:min(1240px, 94%);
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:14px 0;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:1.6rem;
      font-weight:800;
    }

    .brand-badge{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      border-radius:14px;
      background:linear-gradient(135deg, #7c3aed, #f43f5e);
      box-shadow:var(--shadow);
      font-size:1.2rem;
    }

    .nav-center{
      flex:1;
      min-width:240px;
      max-width:540px;
    }

    .search-form{
      display:flex;
      gap:10px;
    }

    .search-form input{
      flex:1;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:white;
      outline:none;
    }

    .search-form input::placeholder{
      color:#c7d2fe;
    }

    .nav-links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav-link{
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--muted);
      transition:.2s ease;
    }

    .nav-link:hover{
      background:rgba(255,255,255,.08);
      color:var(--text);
    }

    .welcome-user{
      color:var(--muted);
      font-size:.95rem;
    }

    .container{
      width:min(1240px, 94%);
      margin:34px auto 60px;
    }

    .featured-hero{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:36px;
      min-height:390px;
      display:flex;
      align-items:end;
      background:#0b1220;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      margin-bottom:30px;
    }

    .featured-backdrop{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      filter:brightness(.34);
      transform:scale(1.04);
      transition:opacity .8s ease;
      opacity:1;
    }

    .featured-backdrop.fade-out{
      opacity:.2;
    }

    .featured-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(3,7,18,.94) 0%, rgba(3,7,18,.62) 48%, rgba(3,7,18,.25) 100%);
    }

    .featured-content{
      position:relative;
      z-index:2;
      max-width:680px;
    }

    .featured-tag{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(244,63,94,.16);
      color:#ffd7df;
      border:1px solid rgba(244,63,94,.22);
      margin-bottom:14px;
      font-size:.9rem;
      font-weight:700;
    }

    .featured-content h1{
      margin:0 0 12px;
      font-size:clamp(2.2rem, 5vw, 3.8rem);
      line-height:1.05;
    }

    .featured-content p{
      color:#dbe5f4;
      line-height:1.7;
      max-width:640px;
      margin-bottom:18px;
    }

    .section{
      margin-top:28px;
      background:linear-gradient(180deg, rgba(28,43,71,.98), rgba(22,35,61,.98));
      border:1px solid var(--line);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
    }

    .section h2{
      margin:0 0 18px;
      font-size:1.7rem;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
      text-decoration:none;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--primary), #fb7185);
      color:white;
    }

    .btn-primary:hover{
      background:linear-gradient(135deg, var(--primary-hover), var(--primary));
      transform:translateY(-1px);
    }

    .btn-secondary{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-favorite{
      background:rgba(251,191,36,.12);
      color:#fde68a;
      border:1px solid rgba(251,191,36,.24);
    }

    .btn-favorite.active{
      background:var(--gold-bg);
      color:#ffe082;
      border:1px solid rgba(251,191,36,.45);
    }

    .filter-bar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .filter-chip{
      padding:9px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      color:var(--muted);
      font-weight:700;
      font-size:.9rem;
    }

    .filter-chip.active{
      background:rgba(244,63,94,.16);
      color:#ffe0e7;
      border-color:rgba(244,63,94,.28);
    }

    .movie-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:22px;
    }

    .movie-grid.filtered-few{
      grid-template-columns:repeat(auto-fit, minmax(260px, 320px));
      justify-content:center;
    }

    .movie-card{
      width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      transition:.28s ease;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
    }

    .movie-card:hover{
      transform:translateY(-6px);
    }

    .poster-frame{
      width:100%;
      height:380px;
      background:#08111f;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .poster-frame img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:16px;
      background:#111827;
    }

    .movie-card-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .movie-title{
      margin:0;
      font-size:1.15rem;
      font-weight:800;
      line-height:1.35;
      min-height:3.1rem;
    }

    .movie-meta{
      margin:0;
      color:var(--muted);
      font-size:.98rem;
    }

    .genre-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0;
    }

    .genre-badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#dbe7f8;
      font-size:.78rem;
      font-weight:700;
    }

    .rating-badge{
      display:inline-block;
      margin:6px 0 8px;
      padding:8px 12px;
      border-radius:14px;
      background:rgba(244,63,94,.12);
      color:#ffd7df;
      border:1px solid rgba(244,63,94,.22);
      font-weight:700;
      width:fit-content;
    }

    .two-col{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:28px;
      align-items:start;
    }

    .poster-card, .detail-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .poster-card{
      border-radius:24px;
      padding:16px;
    }

    .poster-card img{
      width:100%;
      max-height:560px;
      object-fit:cover;
      border-radius:18px;
      display:block;
      background:#111827;
    }

    .detail-card{
      border-radius:28px;
      padding:28px;
    }

    .detail-card h1{
      margin:0 0 10px;
      font-size:2.3rem;
    }

    .detail-meta{
      display:grid;
      gap:10px;
      margin:18px 0;
      color:var(--muted);
      font-size:1rem;
    }

    .overview{
      line-height:1.85;
      color:#e5edf8;
      margin-top:16px;
      font-size:1rem;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .credits-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:16px;
    }

    .credit-card{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }

    .actor-card{
      display:grid;
      grid-template-columns:92px 1fr;
      gap:14px;
      align-items:start;
    }

    .actor-photo{
      width:100%;
      height:120px;
      object-fit:cover;
      border-radius:12px;
      display:block;
      background:#0b1220;
    }

    .credit-role{
      color:var(--muted);
      font-size:.9rem;
      margin-top:6px;
    }

    .recommend-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:18px;
    }

    .recommend-card{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px;
    }

    .recommend-card img{
      width:100%;
      height:260px;
      object-fit:cover;
      border-radius:12px;
      display:block;
      margin-bottom:10px;
      background:#0b1220;
    }

    .empty{
      color:var(--muted);
      padding:10px 0 0;
    }

    @media (max-width: 1200px){
      .movie-grid{
        grid-template-columns:repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px){
      .movie-grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }

      .two-col{
        grid-template-columns:1fr;
      }

      .featured-hero{
        min-height:320px;
        padding:24px;
      }
    }

    @media (max-width: 640px){
      .movie-grid{
        grid-template-columns:1fr;
      }

      .actor-card{
        grid-template-columns:1fr;
      }

      .actor-photo{
        height:220px;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{% url 'home' %}" class="brand">
        <span class="brand-badge">🎬</span>
        <span>MyMovies</span>
      </a>

      <div class="nav-center">
        <form class="search-form" method="get" action="{% url 'home' %}" id="live-search-form">
          <input type="text" name="q" id="live-search-input" placeholder="Buscar películas..." value="{{ query|default:'' }}">
          {% if genre_id %}
            <input type="hidden" name="genre" value="{{ genre_id }}">
          {% endif %}
          <button class="btn btn-secondary" type="submit">Buscar</button>
        </form>
      </div>

      <div class="nav-links">
        <a href="{% url 'home' %}" class="nav-link">Inicio</a>
        <a href="{% url 'my_reviews' %}" class="nav-link">Mis reseñas</a>
        <a href="{% url 'my_favorites' %}" class="nav-link">Mis favoritos</a>

        {% if request.user.is_authenticated %}
          <span class="welcome-user">Hola, {{ request.user.username }}</span>
          <a href="{% url 'logout' %}" class="nav-link">Salir</a>
        {% else %}
          <a href="{% url 'login' %}" class="nav-link">Iniciar sesión</a>
          <a href="{% url 'register' %}" class="nav-link">Registrarse</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    const liveSearchInput = document.getElementById("live-search-input");
    const liveSearchForm = document.getElementById("live-search-form");

    if (liveSearchInput && liveSearchForm) {
      let searchTimeout;

      liveSearchInput.addEventListener("input", function () {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          liveSearchForm.submit();
        }, 500);
      });
    }
  </script>
</body>
</html>
