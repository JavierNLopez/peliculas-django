<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}MyMovies{% endblock %}</title>

  <style>
    :root{
      --bg:#071226;
      --panel:#16233d;
      --panel-soft:#1e2e4d;
      --line:rgba(255,255,255,.08);
      --text:#f8fafc;
      --muted:#b6c2d2;
      --primary:#f43f5e;
      --primary-hover:#e11d48;
      --secondary:#334155;
      --gold:#fbbf24;
      --gold-bg:rgba(251,191,36,.16);
      --danger:#ef4444;
      --shadow:0 14px 35px rgba(0,0,0,.28);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      font-family:Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(244,63,94,.10), transparent 30%),
        radial-gradient(circle at top right, rgba(59,130,246,.10), transparent 25%),
        linear-gradient(180deg, #030712 0%, #071226 55%, #08152c 100%);
      color:var(--text);
      min-height:100vh;
    }

    a{color:inherit;text-decoration:none}

    .navbar{
      position:sticky;
      top:0;
      z-index:20;
      backdrop-filter:blur(12px);
      background:rgba(3,7,18,.82);
      border-bottom:1px solid var(--line);
    }

    .nav-inner{
      width:min(1240px, 94%);
      margin:auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:14px 0;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-size:1.6rem;
      font-weight:800;
    }

    .brand-badge{
      width:42px;
      height:42px;
      display:grid;
      place-items:center;
      border-radius:14px;
      background:linear-gradient(135deg, #7c3aed, #f43f5e);
      box-shadow:var(--shadow);
      font-size:1.2rem;
    }

    .nav-center{
      flex:1;
      min-width:240px;
      max-width:540px;
    }

    .search-form{
      display:flex;
      gap:10px;
    }

    .search-form input{
      flex:1;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.06);
      color:white;
      outline:none;
    }

    .search-form input::placeholder{color:#c7d2fe}

    .nav-links{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    .nav-link{
      padding:10px 14px;
      border-radius:14px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:var(--muted);
      transition:.2s ease;
    }

    .nav-link:hover{
      background:rgba(255,255,255,.08);
      color:var(--text);
    }

    .welcome-user{
      color:var(--muted);
      font-size:.95rem;
    }

    .container{
      width:min(1240px, 94%);
      margin:34px auto 60px;
    }

    .featured-hero{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      padding:36px;
      min-height:390px;
      display:flex;
      align-items:end;
      background:#0b1220;
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      margin-bottom:30px;
    }

    .featured-backdrop{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      filter:brightness(.34);
      transform:scale(1.04);
      transition:opacity .8s ease;
      opacity:1;
    }

    .featured-backdrop.fade-out{opacity:.2}

    .featured-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, rgba(3,7,18,.94) 0%, rgba(3,7,18,.62) 48%, rgba(3,7,18,.25) 100%);
    }

    .featured-content{
      position:relative;
      z-index:2;
      max-width:680px;
    }

    .featured-tag{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(244,63,94,.16);
      color:#ffd7df;
      border:1px solid rgba(244,63,94,.22);
      margin-bottom:14px;
      font-size:.9rem;
      font-weight:700;
    }

    .featured-content h1{
      margin:0 0 12px;
      font-size:clamp(2.2rem, 5vw, 3.8rem);
      line-height:1.05;
    }

    .featured-content p{
      color:#dbe5f4;
      line-height:1.7;
      max-width:640px;
      margin-bottom:18px;
    }

    .section{
      margin-top:28px;
      background:linear-gradient(180deg, rgba(28,43,71,.98), rgba(22,35,61,.98));
      border:1px solid var(--line);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
    }

    .section h2{
      margin:0 0 18px;
      font-size:1.7rem;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
      text-decoration:none;
      min-height:46px;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--primary), #fb7185);
      color:white;
    }

    .btn-primary:hover{
      background:linear-gradient(135deg, var(--primary-hover), var(--primary));
      transform:translateY(-1px);
    }

    .btn-secondary{
      background:rgba(255,255,255,.06);
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-danger{
      background:rgba(239,68,68,.18);
      color:#fecaca;
      border:1px solid rgba(239,68,68,.35);
    }

    .btn-favorite{
      background:rgba(251,191,36,.12);
      color:#fde68a;
      border:1px solid rgba(251,191,36,.24);
    }

    .btn-favorite.active{
      background:var(--gold-bg);
      color:#ffe082;
      border:1px solid rgba(251,191,36,.45);
    }

    .filter-bar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:18px;
    }

    .filter-chip{
      padding:9px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      color:var(--muted);
      font-weight:700;
      font-size:.9rem;
    }

    .filter-chip.active{
      background:rgba(244,63,94,.16);
      color:#ffe0e7;
      border-color:rgba(244,63,94,.28);
    }

    .movie-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:22px;
    }

    .movie-grid.filtered-few{
      grid-template-columns:repeat(auto-fit, minmax(260px, 320px));
      justify-content:center;
    }

    .movie-card{
      width:100%;
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      transition:.28s ease;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      min-height:620px;
      position:relative;
    }

    .movie-card:hover{
      transform:translateY(-8px) scale(1.015);
      box-shadow:0 22px 55px rgba(0,0,0,.45);
      border-color:rgba(244,63,94,.35);
      background:
        radial-gradient(circle at top right, rgba(244,63,94,.15), transparent 35%),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.035));
    }

    .movie-card::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:0;
      background:linear-gradient(135deg, rgba(244,63,94,.18), transparent 35%, rgba(251,191,36,.10));
      transition:.28s ease;
      pointer-events:none;
      z-index:1;
    }

    .movie-card:hover::before{
      opacity:1;
    }

    .poster-frame{
      width:100%;
      height:380px;
      background:#08111f;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
      overflow:hidden;
      position:relative;
      z-index:2;
    }

    .poster-frame img{
      width:100%;
      height:100%;
      object-fit:cover;
      border-radius:16px;
      background:#111827;
      transition:.35s ease;
    }

    .movie-card:hover .poster-frame img{
      transform:scale(1.06);
      filter:brightness(.82) saturate(1.08);
    }

    .movie-card-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
      position:relative;
      z-index:2;
    }

    .movie-card-body .actions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:auto;
      padding-top:14px;
      align-items:end;
    }

    .movie-card-body .actions .btn{
      width:100%;
      text-align:center;
      padding-left:10px;
      padding-right:10px;
    }

    .movie-title{
      margin:0;
      font-size:1.15rem;
      font-weight:800;
      line-height:1.35;
      min-height:3.1rem;
    }

    .movie-meta{
      margin:0;
      color:var(--muted);
      font-size:.98rem;
      min-height:24px;
    }

    .genre-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin:0;
      min-height:64px;
      align-content:flex-start;
    }

    .genre-badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      color:#dbe7f8;
      font-size:.78rem;
      font-weight:700;
    }

    .rating-badge{
      display:inline-block;
      margin:6px 0 8px;
      padding:8px 12px;
      border-radius:14px;
      background:rgba(244,63,94,.12);
      color:#ffd7df;
      border:1px solid rgba(244,63,94,.22);
      font-weight:700;
      width:fit-content;
      min-height:36px;
    }

    .two-col{
      display:grid;
      grid-template-columns:360px 1fr;
      gap:28px;
      align-items:start;
    }

    .poster-card, .detail-card, .form-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
    }

    .poster-card{
      border-radius:24px;
      padding:16px;
    }

    .poster-card img{
      width:100%;
      max-height:560px;
      object-fit:cover;
      border-radius:18px;
      display:block;
      background:#111827;
    }

    .detail-card, .form-card{
      border-radius:28px;
      padding:28px;
    }

    .detail-card h1, .form-card h1{
      margin:0 0 10px;
      font-size:2.3rem;
    }

    .detail-meta{
      display:grid;
      gap:10px;
      margin:18px 0;
      color:var(--muted);
      font-size:1rem;
    }

    .overview{
      line-height:1.85;
      color:#e5edf8;
      margin-top:16px;
      font-size:1rem;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .credits-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
      gap:16px;
    }

    .credit-card{
      padding:14px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }

    .actor-card{
      display:grid;
      grid-template-columns:92px 1fr;
      gap:14px;
      align-items:start;
    }

    .actor-photo{
      width:100%;
      height:120px;
      object-fit:cover;
      border-radius:12px;
      display:block;
      background:#0b1220;
    }

    .credit-role{
      color:var(--muted);
      font-size:.9rem;
      margin-top:6px;
    }

    .recommend-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:18px;
    }

    .recommend-card{
      background:rgba(255,255,255,.03);
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
      transition:.22s ease;
    }

    .recommend-card:hover{transform:translateY(-4px)}

    .recommend-card img{
      width:100%;
      height:320px;
      object-fit:cover;
      border-radius:12px;
      display:block;
      margin-bottom:12px;
      background:#0b1220;
    }

    .recommend-title{
      font-weight:800;
      margin-bottom:6px;
      line-height:1.3;
    }

    .empty{
      color:var(--muted);
      padding:10px 0 0;
    }

    form p{margin:0 0 16px}

    label{
      display:block;
      margin-bottom:8px;
      font-weight:700;
    }

    input, textarea, select{
      width:100%;
      padding:13px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.10);
      background:#f8fafc;
      color:#111827;
      font-size:15px;
      outline:none;
    }

    textarea{
      resize:vertical;
      min-height:140px;
    }

    @media (max-width: 1200px){
      .movie-grid{grid-template-columns:repeat(3, minmax(0, 1fr))}
    }

    @media (max-width: 900px){
      .movie-grid{grid-template-columns:repeat(2, minmax(0, 1fr))}
      .two-col{grid-template-columns:1fr}
      .featured-hero{min-height:320px;padding:24px}
    }

    @media (max-width: 640px){
      .movie-grid{grid-template-columns:1fr}
      .movie-card{min-height:auto}
      .movie-card-body .actions{grid-template-columns:1fr}
      .actor-card{grid-template-columns:1fr}
      .actor-photo{height:220px}
      .recommend-grid{grid-template-columns:1fr}
      .recommend-card img{height:360px}
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="{% url 'home' %}" class="brand">
        <span class="brand-badge">🎬</span>
        <span>MyMovies</span>
      </a>

      <div class="nav-center">
        <form class="search-form" method="get" action="{% url 'home' %}" id="live-search-form">
          <input type="text" name="q" id="live-search-input" placeholder="Buscar películas..." value="{{ query|default:'' }}">
          {% if genre_id %}
            <input type="hidden" name="genre" value="{{ genre_id }}">
          {% endif %}
          <button class="btn btn-secondary" type="submit">Buscar</button>
        </form>
      </div>

      <div class="nav-links">
        <a href="{% url 'home' %}" class="nav-link">Inicio</a>
        <a href="{% url 'my_reviews' %}" class="nav-link">Mis reseñas</a>
        <a href="{% url 'my_favorites' %}" class="nav-link">Mis favoritos</a>

        {% if request.user.is_authenticated %}
          <span class="welcome-user">Hola, {{ request.user.username }}</span>
          <a href="{% url 'logout' %}" class="nav-link">Salir</a>
        {% else %}
          <a href="{% url 'login' %}" class="nav-link">Iniciar sesión</a>
          <a href="{% url 'register' %}" class="nav-link">Registrarse</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    const liveSearchInput = document.getElementById("live-search-input");
    const liveSearchForm = document.getElementById("live-search-form");

    function renderMoviesAjax(data) {
      const container = document.getElementById("movies-grid");
      const empty = document.getElementById("movies-empty");
      if (!container) return;

      container.innerHTML = "";

      if (!data.movies.length) {
        if (empty) empty.style.display = "block";
        return;
      }

      if (empty) empty.style.display = "none";

      data.movies.forEach(movie => {
        const genres = movie.genres.length
          ? movie.genres.map(g => `<span class="genre-badge">${g}</span>`).join("")
          : `<span class="genre-badge">Sin género</span>`;

        const ratingHtml = movie.avg_rating
          ? `<div class="rating-badge">⭐ Usuarios: ${movie.avg_rating}</div>`
          : (movie.tmdb_vote_average
            ? `<div class="rating-badge">⭐ TMDB: ${movie.tmdb_vote_average}</div>`
            : "");

        const favoriteHtml = movie.is_favorite
          ? `<a class="btn btn-favorite active" href="/movie/${movie.id}/favorite/">★ Guardado</a>`
          : `<a class="btn btn-favorite" href="/movie/${movie.id}/favorite/">⭐ Favorito</a>`;

        const card = document.createElement("article");
        card.className = "movie-card";
        card.innerHTML = `
          <a class="poster-frame" href="/movie/${movie.id}/">
            <img src="${movie.poster_url}" alt="${movie.title}">
          </a>
          <div class="movie-card-body">
            <h3 class="movie-title">${movie.title}</h3>
            <p class="movie-meta">${movie.release_date || ""}</p>
            ${ratingHtml}
            <div class="genre-list">${genres}</div>
            <div class="actions">
              <a class="btn btn-primary" href="/movie/${movie.id}/">Ver detalle</a>
              ${favoriteHtml}
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    if (liveSearchInput && liveSearchForm) {
      let searchTimeout;
      let controller = null;

      liveSearchInput.addEventListener("input", function () {
        clearTimeout(searchTimeout);
        const currentValue = this.value.trim();

        searchTimeout = setTimeout(async () => {
          if (currentValue.length === 1) return;

          const params = new URLSearchParams(window.location.search);
          params.set("q", currentValue);
          params.set("ajax", "1");

          const genreInput = liveSearchForm.querySelector('input[name="genre"]');
          if (genreInput && genreInput.value) {
            params.set("genre", genreInput.value);
          }

          if (controller) controller.abort();
          controller = new AbortController();

          try {
            const response = await fetch(`/?${params.toString()}`, {
              signal: controller.signal,
              headers: { "X-Requested-With": "XMLHttpRequest" }
            });
            const data = await response.json();
            renderMoviesAjax(data);
          } catch (error) {
            if (error.name !== "AbortError") {
              console.error(error);
            }
          }
        }, 600);
      });
    }
  </script>
</body>
</html>
