{% extends "movies/base.html" %}

{% block title %}Agregar reseña | MyMovies{% endblock %}

{% block content %}
  <section class="hero">
    <h1>Agregar reseña</h1>
    <p>Comparte tu opinión sobre <strong>{{ movie.title }}</strong>.</p>
  </section>

  <section class="form-card">
    <h2>{{ movie.title }}</h2>

    <form method="post">
      {% csrf_token %}
      {{ movie_review_form.as_p }}

      <div class="actions">
        <button type="submit" class="btn btn-primary">Guardar reseña</button>
        <a href="{% url 'movie_detail' movie.id %}" class="btn btn-secondary">Cancelar</a>
      </div>
    </form>
  </section>
{% endblock %}
